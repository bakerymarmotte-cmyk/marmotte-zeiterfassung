<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort ändern – Marmotte Zeiterfassung</title>
<link rel="icon" href="assets/icon_zeiterfassung_favicon32.png" type="image/png">
<link rel="apple-touch-icon" href="assets/icon_zeiterfassung_apple-touch-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A1A1A">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .pw-wrap { width: 100%; max-width: 400px; }
  .pw-card { padding: 32px; }
  .pw-card h1 { font-size: 20px; margin: 0 0 8px; }
  .pw-card p.sub { color: var(--color-text-muted); font-size: 14px; margin: 0 0 24px; }
</style>
</head>
<body>

<div class="centered-screen">
  <div class="pw-wrap">
    <div class="card pw-card">
      <h1>Willkommen bei Marmotte 👋</h1>
      <p class="sub">Das ist dein erster Login. Bitte setze jetzt dein eigenes Passwort.</p>

      <form id="pw-form">
        <div class="field">
          <label for="new-password">Neues Passwort</label>
          <input type="password" id="new-password" minlength="6" required autocomplete="new-password">
        </div>
        <div class="field">
          <label for="confirm-password">Passwort bestätigen</label>
          <input type="password" id="confirm-password" minlength="6" required autocomplete="new-password">
        </div>
        <div class="error-text" id="error-text"></div>
        <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;">Passwort speichern</button>
      </form>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db } from "./firebase-config.js";
  import { onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const form = document.getElementById("pw-form");
  const errorText = document.getElementById("error-text");
  const submitBtn = document.getElementById("submit-btn");

  let currentUser = null;
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }
    currentUser = user;
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorText.textContent = "";
    const pw1 = document.getElementById("new-password").value;
    const pw2 = document.getElementById("confirm-password").value;

    if (pw1 !== pw2) {
      errorText.textContent = "Die Passwörter stimmen nicht überein.";
      return;
    }
    if (!currentUser) {
      errorText.textContent = "Kein angemeldeter Nutzer gefunden. Bitte erneut einloggen.";
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Wird gespeichert …";

    try {
      await updatePassword(currentUser, pw1);
      await updateDoc(doc(db, "users", currentUser.uid), { mustChangePassword: false });
      window.location.href = "app.html";
    } catch (err) {
      console.error(err);
      if (err.code === "auth/requires-recent-login") {
        errorText.textContent = "Aus Sicherheitsgründen musst du dich erneut einloggen, bevor du das Passwort änderst. Bitte kurz aus- und wieder einloggen.";
      } else {
        errorText.textContent = "Passwort konnte nicht gespeichert werden. Bitte erneut versuchen.";
      }
      submitBtn.disabled = false;
      submitBtn.textContent = "Passwort speichern";
    }
  });
</script>

</body>
</html>
