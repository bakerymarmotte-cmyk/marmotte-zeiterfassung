<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort ändern – Marmotte Zeiterfassung</title>
<link rel="icon" href="assets/favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" sizes="120x120" href="assets/appletouchicon120.png">
<link rel="apple-touch-icon" sizes="152x152" href="assets/appletouchicon152.png">
<link rel="apple-touch-icon" sizes="167x167" href="assets/appletouchicon167.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/appletouchicon180.png">
<meta name="msapplication-config" content="browserconfig.xml">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A1A1A">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .pw-wrap { width: 100%; max-width: 400px; }
  .pw-card { padding: 32px; }
  .pw-card h1 { font-size: 20px; margin: 0 0 8px; }
  .pw-card p.sub { color: var(--color-text-muted); font-size: 14px; margin: 0 0 24px; }
  .pw-requirements {
    list-style: none;
    padding: 0;
    margin: -6px 0 18px;
    display: grid;
    gap: 6px;
  }
  .pw-requirements li {
    font-size: 13px;
    color: var(--color-text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pw-requirements li .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--color-border);
    flex: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    line-height: 1;
  }
  .pw-requirements li.ok { color: var(--color-text); }
  .pw-requirements li.ok .dot {
    background: var(--color-success);
    border-color: var(--color-success);
    color: #121212;
  }
</style>
</head>
<body>

<div class="centered-screen">
  <div class="pw-wrap">
    <div class="card pw-card">
      <h1>Willkommen im Marmotte 👋</h1>
      <p class="sub">Das ist dein erster Login. Bitte setze jetzt dein eigenes Passwort.</p>

      <form id="pw-form">
        <div class="field">
          <label for="new-password">Neues Passwort</label>
          <input type="password" id="new-password" minlength="8" required autocomplete="new-password">
        </div>
        <ul class="pw-requirements" id="pw-requirements">
          <li data-rule="length"><span class="dot">✓</span> Mindestens 8 Zeichen</li>
          <li data-rule="lower"><span class="dot">✓</span> Ein Kleinbuchstabe</li>
          <li data-rule="upper"><span class="dot">✓</span> Ein Grossbuchstabe</li>
          <li data-rule="number"><span class="dot">✓</span> Eine Zahl</li>
          <li data-rule="special"><span class="dot">✓</span> Ein Sonderzeichen (z. B. !?%&)</li>
        </ul>
        <div class="field">
          <label for="confirm-password">Passwort bestätigen</label>
          <input type="password" id="confirm-password" minlength="8" required autocomplete="new-password">
        </div>
        <div class="error-text" id="error-text"></div>
        <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;">Passwort speichern</button>
      </form>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db } from "./firebase-config.js";
  import { onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const form = document.getElementById("pw-form");
  const errorText = document.getElementById("error-text");
  const submitBtn = document.getElementById("submit-btn");
  const newPasswordInput = document.getElementById("new-password");
  const requirementsList = document.getElementById("pw-requirements");

  const rules = {
    length: (pw) => pw.length >= 8,
    lower: (pw) => /[a-z]/.test(pw),
    upper: (pw) => /[A-Z]/.test(pw),
    number: (pw) => /[0-9]/.test(pw),
    special: (pw) => /[^A-Za-z0-9]/.test(pw),
  };

  function checkPasswordRules(pw) {
    let allOk = true;
    for (const [rule, test] of Object.entries(rules)) {
      const li = requirementsList.querySelector(`[data-rule="${rule}"]`);
      const ok = test(pw);
      li.classList.toggle("ok", ok);
      if (!ok) allOk = false;
    }
    return allOk;
  }

  newPasswordInput.addEventListener("input", () => {
    checkPasswordRules(newPasswordInput.value);
  });

  let currentUser = null;
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }
    currentUser = user;
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorText.textContent = "";
    const pw1 = document.getElementById("new-password").value;
    const pw2 = document.getElementById("confirm-password").value;

    if (pw1 !== pw2) {
      errorText.textContent = "Die Passwörter stimmen nicht überein.";
      return;
    }
    if (!checkPasswordRules(pw1)) {
      errorText.textContent = "Das Passwort erfüllt noch nicht alle Anforderungen.";
      return;
    }
    if (!currentUser) {
      errorText.textContent = "Kein angemeldeter Nutzer gefunden. Bitte erneut einloggen.";
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Wird gespeichert …";

    try {
      await updatePassword(currentUser, pw1);
      await updateDoc(doc(db, "users", currentUser.uid), { mustChangePassword: false });
      window.location.href = "app.html";
    } catch (err) {
      console.error(err);
      if (err.code === "auth/requires-recent-login") {
        errorText.textContent = "Aus Sicherheitsgründen musst du dich erneut einloggen, bevor du das Passwort änderst. Bitte kurz aus- und wieder einloggen.";
      } else {
        errorText.textContent = "Passwort konnte nicht gespeichert werden. Bitte erneut versuchen.";
      }
      submitBtn.disabled = false;
      submitBtn.textContent = "Passwort speichern";
    }
  });
</script>

</body>
</html>
